name: "Dynatrace Terraform Provider Deploy"

on:
  workflow_call:
    inputs:
      target_environment:
        required: true
        type: string
      target_folder:
        required: true
        type: string
      action:
        required: true
        type: string
      dynatrace_env_url:
        required: true
        type: string
      dir_artifact_name:
        required: true
        type: string
      tf_backend_storage_account:
        required: true
        type: string
      tf_backend_container:
        required: true
        type: string

# Limit concurrent runs per environment to prevent state conflicts
concurrency:
  group: extract-api-token-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  call_generate_dynatrace_api_token:
    name: "Call Generate API Token Workflow for environment: [${{ inputs.target_environment }}]"
    uses: ./.github/workflows/generate_api_token.yaml
    secrets: inherit
    with:
      environment: ${{ inputs.target_environment }}

  call_extract_dynatrace_api_token:
    name: "Call Extract API Token Workflow for environment: [${{ inputs.target_environment }}]"
    uses: ./.github/workflows/extract_api_token.yaml
    needs: call_generate_dynatrace_api_token
    secrets: inherit
    with:
      environment: ${{ inputs.target_environment }}

  dynatrace_deploy_configuration:
    name: Terraform Export [${{ inputs.target_environment }}]
    runs-on: ubuntu-latest
    needs: call_extract_dynatrace_api_token

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ inputs.target_environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Set the working directory for Terraform commands based on the selected environment.
      TF_WORKING_DIR: environments/${{ inputs.target_environment }}/iac
      # Azure Service Principal credentials — stored as secrets in each
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      # Dynatrace environment URL and API token — also stored as secrets in GitHub environments.
      DYNATRACE_ENV_URL: ${{ inputs.dynatrace_env_url }}
      DYNATRACE_API_TOKEN: ${{ needs.call_extract_dynatrace_api_token.outputs.api_token }}
      # Dynatrace OAuth2 Client
      DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
      DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
      DT_ACCOUNT_ID: ${{ vars.DT_ACCOUNT_ID }}
      TARGET_FOLDER:  ${{ inputs.target_folder }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Download directory artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.dir_artifact_name }}
          path: ${{ env.TARGET_FOLDER }}

      - name: 'List directory contents for verification'
        run: |
          ls -lsa "$TARGET_FOLDER"

      - name: 'Terraform Setup for IaC'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: 'Terraform Init for Dynatrace Export'
        id: init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=$TF_WORKING_DIR/terraform.tfstate"
        env:
          TF_VAR_environment: ${{ inputs.target_environment }}
        working-directory: ${{ env.TARGET_FOLDER }}

      - name: 'Terraform Validate'
        id: validate
        if: steps.init.outcome == 'success'
        run: terraform validate -no-color
        working-directory: ${{ env.TARGET_FOLDER }}

      # --------------------------------------------------------------
      # Terraform Plan
      # Runs for both "plan" and "apply" actions.
      # Environment variables (vars.*) and secrets (secrets.*) are
      # automatically scoped to the selected GitHub environment.
      # --------------------------------------------------------------
      - name: 'Terraform Plan'
        id: plan
        if: inputs.action == 'dry-run' || inputs.action == 'deploy'
        run: |
          terraform plan -out=tfplan
        working-directory: ${{ env.TARGET_FOLDER }}

      # Post plan output as a PR comment (optional but useful)
      - name: 'Post Plan to Summary'
        if: inputs.action == 'dry-run' || inputs.action == 'deploy'
        run: |
          echo "## Terraform Plan — \`${{ github.event.inputs.target_environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        working-directory: ${{ env.TARGET_FOLDER }}

      # --------------------------------------------------------------
      # Terraform Apply
      # Only runs when "apply" is selected AND plan succeeded.
      # --------------------------------------------------------------
      - name: Terraform Apply
        id: apply
        if: inputs.action == 'deploy' && inputs.action == 'success'
        run: terraform apply -auto-approve
        working-directory: ${{ env.TARGET_FOLDER }}

  call_delete_dynatrace_api_token:
    name: "Call Delete API Token Workflow for environment: [${{ inputs.target_environment }}]"
    uses: ./.github/workflows/delete_api_token.yaml
    needs: dynatrace_deploy_configuration
    if: always()
    secrets: inherit
    with:
      environment: ${{ inputs.target_environment }}
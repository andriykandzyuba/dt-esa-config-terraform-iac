name: "Azure Blob Storage Upload"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      target_folder:
        required: true
        type: string
      export_file_name:
        required: true
        type: string
      build_timestamp:
        required: true
        type: string
      tf_backend_storage_account:
        required: true
        type: string
      tf_backend_container:
        required: true
        type: string
      dir_artifact_name:
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      TARGET_FOLDER: ${{ inputs.target_folder }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Download the directory'
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.dir_artifact_name }}
          path: ${{ inputs.target_folder }}

      - name: 'Verify contents'
        run: |
          echo "Target folder: ${{ inputs.target_folder }}"
          ls -la .
        working-directory: ${{ inputs.target_folder }}

      - name: 'Create Recursive Tarball'
        env:
          ARCHIVE: ${{ inputs.export_file_name }}-${{ inputs.build_timestamp }}.tar.gz
        run: |
          tar -czf "$RUNNER_TEMP/$ARCHIVE" -C . .
          mv "$RUNNER_TEMP/$ARCHIVE" "./$ARCHIVE".
          ls -la .
        working-directory: ${{ inputs.target_folder }}

      - name: 'Upload zip to Azure Blob Storage'
        uses: azure/cli@v2
        with:
          inlineScript: |
            ls -las .
            az storage blob upload \
              --account-name ${{ inputs.tf_backend_storage_account }} \
              --container-name ${{ inputs.tf_backend_container }} \
              --file ${{ inputs.target_folder }}/${{ inputs.export_file_name }}-${{ inputs.build_timestamp }}.tar.gz \
              --name ${{ inputs.target_folder }}/${{ inputs.export_file_name }}-${{ inputs.build_timestamp }}.tar.gz \
              --auth-mode key \
              --account-key ${{ secrets.ARM_ACCESS_KEY }}


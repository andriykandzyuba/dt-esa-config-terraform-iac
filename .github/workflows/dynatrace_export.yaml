name: "Dynatrace Terraform Provider CLI Export"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
          - yyo96051
          - val72867
        default: dev
      terraform_action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - list-exclusions
        default: list-exclusions

# Limit concurrent runs per environment to prevent state conflicts
concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  extract_dynatrace_api_token:
    name: Terraform Security ${{ github.event.inputs.terraform_action }} [${{ github.event.inputs.environment }}]
    runs-on: ubuntu-latest

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ github.event.inputs.environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      # GitHub environment (dev / staging / prod).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Set the working directory for Terraform commands based on the selected environment.
      TF_WORKING_DIR: environments/${{ github.event.inputs.environment }}/security
      # Azure Service Principal credentials — stored as secrets in each
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      # Dynatrace environment URL and API token — also stored as secrets in GitHub environments.
      DYNATRACE_ENV_URL: ${{ vars.DYNATRACE_ENV_URL }}
      DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    outputs:
      # Map the job output name 'output1' to the step output 'test'
      myoutput: ${{ steps.extract_token.outputs.access_token }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Terraform Setup for Security'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: 'Terraform Init for Security'
        id: init
        # -backend-config flags inject the Azure Blob Storage coordinates at
        # runtime so no values are hard-coded in .tf files. The state key is
        # namespaced per environment (e.g. dev/terraform.tfstate).
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=$TF_WORKING_DIR/terraform.tfstate"
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: 'Terraform Validate'
        id: validate
        if: steps.init.outcome == 'success'
        run: terraform validate -no-color

      # --------------------------------------------------------------
      # Terraform Extract Token
      # --------------------------------------------------------------
      - name: Terraform Extract Token
        id:  extract_token
        if: steps.validate.outcome == 'success'
        run: |
          # Extract the API token value from Terraform output and set it as an output variable
          GENETATED_API_TOKEN=$(terraform state pull | jq -r '.resources.[0].instances.[0].attributes.token')
          echo "access_token=${GENETATED_API_TOKEN}" >> $GITHUB_OUTPUT

  dynatrace_export_configuration:
    name: Terraform IaC ${{ github.event.inputs.terraform_action }} [${{ github.event.inputs.environment }}]
    runs-on: ubuntu-latest
    needs: extract_dynatrace_api_token

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ github.event.inputs.environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      # GitHub environment (dev / staging / prod).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Set the working directory for Terraform commands based on the selected environment.
      TF_WORKING_DIR: environments/${{ github.event.inputs.environment }}/export
      # Azure Service Principal credentials — stored as secrets in each
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      # Dynatrace environment URL and API token — also stored as secrets in GitHub environments.
      DYNATRACE_ENV_URL: ${{ vars.DYNATRACE_ENV_URL }}
      DYNATRACE_API_TOKEN: ${{ needs.extract_dynatrace_api_token.outputs.myoutput }}
      # Dynatrace Terraform Provider CLI
      DT_ACCOUNT_ID: ${{ github.event.inputs.environment }}
      DYNATRACE_TARGET_FOLDER: environments/${{ github.event.inputs.environment }}/export/data

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Terraform Setup for IaC'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: 'Terraform Init for Dynatrace Export'
        id: init
        run: |
          terraform init -input=false
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: 'Terraform Validate'
        id: validate
        if: steps.init.outcome == 'success'
        run: terraform validate -no-color

      - name: 'Configuration Exclusions'
        id: export_configuration
        if: steps.validate.outcome == 'success' && github.event.inputs.terraform_action == 'list-exclusions'
        run: |
          echo "Working directory: $TF_WORKING_DIR"
          ls -las .terraform/providers/registry.terraform.io/dynatrace-oss/dynatrace/1.91.1/linux_amd64
name: "Generate API Token"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        type: string

# Limit concurrent runs per environment to prevent state conflicts
concurrency:
  group: generate-api-token-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  dynatrace-api-token:
    name: "Generate API Token for environment: [${{ inputs.environment }}]"
    runs-on: ubuntu-latest

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ inputs.environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      # GitHub environment (dev / staging / prod).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Set the working directory for Terraform commands based on the selected environment.
      TF_WORKING_DIR: environments/${{ inputs.environment }}/security
      # Azure Service Principal credentials — stored as secrets in each
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      # Dynatrace environment URL and API token — also stored as secrets in GitHub environments.
      DYNATRACE_ENV_URL: ${{ vars.DYNATRACE_ENV_URL }}
      DYNATRACE_API_TOKEN: ${{ secrets.DYNATRACE_API_TOKEN }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Terraform Setup'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: 'Create working directory'
        run: |
          mkdir -p "$TF_WORKING_DIR"
          ls -la "$TF_WORKING_DIR"

      - name: 'Create Terraform providers configuration'
        run: |
          pwd
          cat <<EOF > ./__providers__.tf
          terraform {
            required_providers {
              dynatrace = {
                source = "dynatrace-oss/dynatrace"
                version = "1.91.1"
              }
            }
            backend "azurerm" {}
          }
          EOF
          cat <<EOF > ./main.tf
          # environments/dev/main.tf
          module "dynatrace_api_token" {
            # Path to your local module folder
            source = "../../../modules/dynatrace_api_token"
            dt_esa_api_token_name = var.dt_esa_api_token_name
            dt_esa_api_token_scope = var.dt_esa_api_token_scope
          }
          cat <<EOF > ./variables.tf
          variable "dt_esa_api_token_name" {
          description = "Name of the Dynatrace API Token. The default value is set to 'Dynatrace API Token'."
            type = string
            default = "Dynatrace Terraform API Token"
          }
          
          variable "dt_esa_api_token_scope" {
            description = "Dynatrace API Token scopes."
            type = list(string)
            default = [
              "settings.read", "settings.write",
              "ReadConfig", "WriteConfig",
              "CaptureRequestData",
              "ExternalSyntheticIntegration",
              "activeGateTokenManagement.create", "activeGateTokenManagement.read", "activeGateTokenManagement.write",
              "apiTokens.read", "apiTokens.write",
              "attacks.read", "attacks.write",
              "credentialVault.read", "credentialVault.write",
              "entities.read",
              "extensions.write",
              "extensionEnvironment.read", "extensionEnvironment.write",
              "networkZones.read", "networkZones.write",
              "securityProblems.read", "securityProblems.write",
              "slo.read", "slo.write"
            ]
          }
          EOF
          ls -las .

      - name: 'Terraform Init'
        id: init
        # -backend-config flags inject the Azure Blob Storage coordinates at
        # runtime so no values are hard-coded in .tf files. The state key is
        # namespaced per environment (e.g. dev/terraform.tfstate).
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=$TF_WORKING_DIR/terraform.tfstate"
        env:
          TF_VAR_environment: ${{ inputs.environment }}

      - name: 'Terraform Validate'
        id: validate
        run: terraform validate -no-color

      # --------------------------------------------------------------
      # Terraform Plan
      # Runs for both "plan" and "apply" actions.
      # Environment variables (vars.*) and secrets (secrets.*) are
      # automatically scoped to the selected GitHub environment.
      # --------------------------------------------------------------
      - name: 'Terraform Plan'
        id: plan
        run: |
          terraform plan -out=tfplan

      # Post plan output as a PR comment (optional but useful)
      - name: 'Post Plan to Summary'
        run: |
          echo "## Terraform Plan — \`${{ inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------------------
      # Terraform Apply
      # Only runs when "apply" is selected AND plan succeeded.
      # --------------------------------------------------------------
      - name: Terraform Apply
        id: apply
        if: steps.plan.outcome == 'success'
        run: terraform apply -auto-approve
name: "Dynatrace Deploy Configurations"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - yyo96051
          - val72867
          - ual
        default: dev
      terraform_action:
        description: "Terraform action to perform"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan

# Limit concurrent runs per environment to prevent state conflicts
concurrency:
  group: terraform-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  call_extract_dynatrace_api_token:
    name: "Call Extract API Token Workflow for environment: [${{ github.event.inputs.environment }}]"
    uses: ./.github/workflows/extract_api_token.yaml
    secrets: inherit
    with:
      environment: ${{ github.event.inputs.environment }}

  deploy_dynatrace_iac:
    name: Terraform IaC ${{ github.event.inputs.terraform_action }} [${{ github.event.inputs.environment }}]
    runs-on: ubuntu-latest
    needs: call_extract_dynatrace_api_token

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ github.event.inputs.environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      # GitHub environment (dev / staging / prod).
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Set the working directory for Terraform commands based on the selected environment.
      TF_WORKING_DIR: environments/${{ github.event.inputs.environment }}/iac
      # Azure Service Principal credentials — stored as secrets in each
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}
      # Dynatrace environment URL and API token — also stored as secrets in GitHub environments.
      DYNATRACE_ENV_URL: ${{ vars.DYNATRACE_ENV_URL }}
      DYNATRACE_API_TOKEN: ${{ needs.call_extract_dynatrace_api_token.outputs.api_token }}
      # Dynatrace OAuth2 Client
      DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
      DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
      DT_ACCOUNT_ID: ${{ secrets.DT_ACCOUNT_ID }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Terraform Setup for IaC'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: 'Terraform Init for IaC'
        id: init
        # -backend-config flags inject the Azure Blob Storage coordinates at
        # runtime so no values are hard-coded in .tf files. The state key is
        # namespaced per environment (e.g. dev/terraform.tfstate).
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=$TF_WORKING_DIR/terraform.tfstate"
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment }}

      - name: 'Terraform Validate'
        id: validate
        run: terraform validate -no-color

      # --------------------------------------------------------------
      # Terraform Plan
      # Runs for both "plan" and "apply" actions.
      # Environment variables (vars.*) and secrets (secrets.*) are
      # automatically scoped to the selected GitHub environment.
      # --------------------------------------------------------------
      - name: 'Terraform Plan'
        id: plan
        if: github.event.inputs.terraform_action == 'plan' || github.event.inputs.terraform_action == 'apply'
        run: |
          terraform plan -out=tfplan

      # Post plan output as a PR comment (optional but useful)
      - name: 'Post Plan to Summary'
        if: github.event.inputs.terraform_action == 'plan' || github.event.inputs.terraform_action == 'apply'
        run: |
          echo "## Terraform Plan — \`${{ github.event.inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------------------
      # Terraform Apply
      # Only runs when "apply" is selected AND plan succeeded.
      # --------------------------------------------------------------
      - name: Terraform Apply
        id: apply
        if: github.event.inputs.terraform_action == 'apply' && steps.plan.outcome == 'success'
        run: terraform apply -auto-approve

      # --------------------------------------------------------------
      # Terraform Destroy
      # Only runs when "destroy" is explicitly selected.
      # --------------------------------------------------------------
      - name: Terraform Destroy
        id: destroy
        if: github.event.inputs.terraform_action == 'destroy'
        run: |
          terraform plan -destroy -out=tfplan-destroy
          terraform apply -auto-approve tfplan-destroy
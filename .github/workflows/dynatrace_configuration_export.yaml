name: "Dynatrace Configuration Export"

on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: "Source Dynatrace environment"
        required: true
        type: choice
        options:
          - yhu28601
          - hia75022
        default: yhu28601
      format:
        description: "Export format"
        required: true
        type: choice
        options:
          - monaco
          - terraform
        default: monaco
      storage:
        description: "Export storage type"
        required: true
        type: choice
        options:
          - azure-blob
          - github-repo
        default: azure-blob

concurrency:
  group: export-${{ github.event.inputs.source_environment }}
  cancel-in-progress: false

jobs:
  dynatrace_export_configuration:
    name: Dynatrace Export ${{ github.event.inputs.format }} [${{ github.event.inputs.source_environment }}]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.source_environment }}

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DYNATRACE_ENV_URL: ${{ vars.DYNATRACE_ENV_URL }}
      DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
      DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
      TARGET_FOLDER: environments/${{ github.event.inputs.source_environment }}/data
      DIR_ARTIFACT_NAME: export-dir-artifact

    outputs:
      build_timestamp: ${{ steps.build_timestamp.outputs.version }}
      target_folder: ${{ env.TARGET_FOLDER }}
      tf_backend_storage_account: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
      tf_backend_container: ${{ vars.TF_BACKEND_CONTAINER }}
      dir_artifact_name: ${{ env.DIR_ARTIFACT_NAME }}
      gh_repo_owner: ${{ vars.GH_REPO_OWNER }}
      gh_repo_name: ${{ vars.GH_REPO_NAME }}
      dynatrace_env_url: ${{ env.DYNATRACE_ENV_URL }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Set the build timestamp'
        id: build_timestamp
        shell: bash
        run: echo "version=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

  export_with_monaco:
    needs: dynatrace_export_configuration
    uses: ./.github/workflows/dynatrace_monaco_export.yaml
    if: ${{ github.event.inputs.format == 'monaco' }}
    with:
      environment: ${{ github.event.inputs.source_environment }}
      dynatrace_env_url: ${{ needs.dynatrace_export_configuration.outputs.dynatrace_env_url }}
      dir_artifact_name: ${{ needs.dynatrace_export_configuration.outputs.dir_artifact_name }}
      target_folder: ${{ needs.dynatrace_export_configuration.outputs.target_folder }}
    secrets: inherit

  export_with_terraform:
    needs: dynatrace_export_configuration
    uses: ./.github/workflows/dynatrace_terraform_export.yaml
    if: ${{ github.event.inputs.format == 'terraform' }}
    with:
      environment: ${{ github.event.inputs.source_environment }}
      dynatrace_env_url: ${{ needs.dynatrace_export_configuration.outputs.dynatrace_env_url }}
      dir_artifact_name: ${{ needs.dynatrace_export_configuration.outputs.dir_artifact_name }}
      tf_backend_storage_account: ${{ needs.dynatrace_export_configuration.outputs.tf_backend_storage_account }}
      tf_backend_container: ${{ needs.dynatrace_export_configuration.outputs.tf_backend_container }}
    secrets: inherit

  upload_to_azure:
    needs: [export_with_monaco, export_with_terraform, dynatrace_export_configuration]
    uses: ./.github/workflows/azure_blob_upload.yaml
    if: always() && (github.event.inputs.storage == 'azure-blob') && contains(needs.*.result, 'success')
    with:
      environment: ${{ github.event.inputs.source_environment }}
      target_folder: ${{ needs.dynatrace_export_configuration.outputs.target_folder }}
      export_file_name: ${{ github.event.inputs.format }}-${{ github.event.inputs.source_environment }}
      build_timestamp: ${{ needs.dynatrace_export_configuration.outputs.build_timestamp }}
      tf_backend_storage_account: ${{ needs.dynatrace_export_configuration.outputs.tf_backend_storage_account }}
      tf_backend_container: ${{ needs.dynatrace_export_configuration.outputs.tf_backend_container }}
      dir_artifact_name: ${{ needs.dynatrace_export_configuration.outputs.dir_artifact_name }}
    secrets: inherit

  push_to_github:
    needs: [export_with_monaco, export_with_terraform, dynatrace_export_configuration]
    uses: ./.github/workflows/github_repo_upload.yaml
    if: always() && (github.event.inputs.storage == 'github-repo') && contains(needs.*.result, 'success')
    with:
      environment: ${{ github.event.inputs.source_environment }}
      dir_artifact_name: ${{ needs.dynatrace_export_configuration.outputs.dir_artifact_name }}
      gh_repo_owner: ${{ needs.dynatrace_export_configuration.outputs.gh_repo_owner }}
      gh_repo_name: ${{ needs.dynatrace_export_configuration.outputs.gh_repo_name }}
      gh_branch_name: ${{ github.event.inputs.format }}-${{ github.event.inputs.source_environment }}-${{ needs.dynatrace_export_configuration.outputs.build_timestamp }}
    secrets: inherit
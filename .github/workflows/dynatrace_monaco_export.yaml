name: "Monaco Export"

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      dynatrace_env_url:
        required: true
        type: string
      dir_artifact_name:
        required: true
        type: string

jobs:
  monaco_export_configuration:
    name: Monaco Export [${{ github.event.inputs.source_environment }}]
    runs-on: ubuntu-latest

    environment: ${{ inputs.environment }}

    env:
      DYNATRACE_ENV_URL: ${{ inputs.dynatrace_env_url }}
      DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
      DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
      DIR_ARTIFACT_NAME: ${{ inputs.dir_artifact_name }}
      TARGET_FOLDER: environments/${{ github.event.inputs.source_environment }}/monaco

    steps:
      - name: 'Set up working directory'
        run: |
          mkdir -p "$TARGET_FOLDER"
          ls -la "$TARGET_FOLDER"

      - name: 'Install Dynatrace Monaco Tool'
        run: |
          curl -L https://github.com/Dynatrace/dynatrace-configuration-as-code/releases/latest/download/monaco-linux-amd64 -o monaco-linux-amd64
          mv monaco-linux-amd64 monaco
          chmod +x monaco
          sudo mv monaco /usr/local/bin/
          monaco version
        working-directory: ${{ env.TARGET_FOLDER }}

      #- name: 'Dynatrace Monaco Configuration Download'
      #  run: |
      #    monaco download --url ${{ env.DYNATRACE_ENV_URL }} \
      #      --oauth-client-id DT_CLIENT_ID \
      #      --oauth-client-secret DT_CLIENT_SECRET \
      #      --output-folder .generated
      #  working-directory: ${{ env.TARGET_FOLDER }}

      - name: 'Re-Generate Monaco Projects Manifest'
        run: |
          cat <<EOF > ./.generated/manifest-projects.yaml
          manifestVersion: "1.0"
          projects:
            - name: project
          environmentGroups:
            - name: default
              environments:
                - name: project
                  url:
                    value: $DYNATRACE_ENV_URL
                  auth:
                    oAuth:
                      clientId:
                        type: environment
                        name: DT_CLIENT_ID
                      clientSecret:
                        type: environment
                        name: DT_CLIENT_SECRET
          EOF
          cat ./.generated/manifest-projects.yaml
        working-directory: ${{ env.TARGET_FOLDER }}

      - name: 'Upload directory as artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIR_ARTIFACT_NAME }}
          path: ${{ env.TARGET_FOLDER }}/.generated/**
          include-hidden-files: true
          retention-days: 1
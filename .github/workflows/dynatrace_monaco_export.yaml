name: "Dynatrace Monaco Tool Export"

on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: "Source Dynatrace environment"
        required: true
        type: choice
        options:
          - yhu28601
          - ual
          - ualpre
          - hia75022
          - val72867
          - vtq72629
          - avc65257
          - jqa38275
          - rwb66447
          - yyo96051
          - zpa13569
          - bwf66177
        default: yhu28601
      monaco_action:
        description: "Monaco action to perform"
        required: true
        type: choice
        options:
          - export
        default: export
      storage:
        description: "Export storage target"
        required: true
        type: choice
        options:
          - azure-blob
          - github-repo
        default: azure-blob

# Limit concurrent runs per environment to prevent state conflicts
concurrency:
  group: monaco-export-${{ github.event.inputs.source_environment }}
  cancel-in-progress: false

jobs:
  dynatrace_export_configuration:
    name: Dynatrace Monaco ${{ github.event.inputs.monaco_action }} [${{ github.event.inputs.source_environment }}]
    runs-on: ubuntu-latest

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ github.event.inputs.source_environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Dynatrace OAuth2 Client
      DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
      DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
      # Dynatrace Monaco Tool Export Target Folder
      MONACO_TARGET_FOLDER: environments/${{ github.event.inputs.source_environment }}/monaco
      DIR_ARTIFACT_NAME: export-dir-artifact
      # External Github Repository details for pushing the exported configuration as an artifact (if selected as storage target)
      GH_REPO_OWNER: ${{ vars.GH_REPO_OWNER }}
      GH_REPO_NAME: ${{ vars.GH_REPO_NAME }}
      GH_GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    outputs:
      build_timestamp: ${{ steps.build_timestamp.outputs.version }}
      target_folder: ${{ env.MONACO_TARGET_FOLDER }}
      tf_backend_storage_account: ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}
      tf_backend_container: ${{ vars.TF_BACKEND_CONTAINER }}
      dir_artifact_name:  ${{ steps.dir_artifact_name.outputs.dir_artifact_name }}
      gh_repo_owner: ${{ steps.external_github_repo_details.outputs.gh_repo_owner }}
      gh_repo_name: ${{ steps.external_github_repo_details.outputs.gh_repo_name }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Set up working directory'
        run: |
          mkdir -p $MONACO_TARGET_FOLDER
          ls -la $MONACO_TARGET_FOLDER

      - name: 'Install Dynatrace Monaco Tool'
        run: |
          curl -L https://github.com/Dynatrace/dynatrace-configuration-as-code/releases/latest/download/monaco-linux-amd64 -o monaco-linux-amd64
          mv monaco-linux-amd64 monaco
          chmod +x monaco
          sudo mv monaco /usr/local/bin/
          monaco version
        working-directory: ${{ env.MONACO_TARGET_FOLDER }}

      # Temporarily commented out to avoid hitting API rate limits during development.
      # - name: 'Dynatrace Monaco Account Download'
      #  run: |
      #    monaco account download \
      #      --oauth-client-id DT_CLIENT_ID \
      #      --oauth-client-secret DT_CLIENT_SECRET \
      #      -u ${{ vars.DT_ACCOUNT_ID }} \
      #      --output-folder .generated
      #  working-directory: ${{ env.MONACO_TARGET_FOLDER }}

      #- name: 'Dynatrace Monaco Configuration Download'
      #  run: |
      #    monaco download --url ${{ vars.DYNATRACE_ENV_URL }} \
      #      --oauth-client-id DT_CLIENT_ID \
      #      --oauth-client-secret DT_CLIENT_SECRET \
      #      --output-folder .generated
      #  working-directory: ${{ env.MONACO_TARGET_FOLDER }}

      - name: 'Simulate Monaco Export'
        shell: bash
        run: |
          mkdir -p ${{ env.MONACO_TARGET_FOLDER }}/.generated
          echo "Simulating Monaco export for environment ${{ github.event.inputs.source_environment }}" > ${{ env.MONACO_TARGET_FOLDER }}/.generated/export.txt
          ls -las ${{ env.MONACO_TARGET_FOLDER }}/.generated

      - name: 'Upload directory as artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DIR_ARTIFACT_NAME }}
          path: ${{ env.MONACO_TARGET_FOLDER }}/.generated/**
          include-hidden-files: true
          retention-days: 1

      - name: 'Set the build timestamp'
        id: build_timestamp
        shell: bash
        run: |
          echo "version=$(date +'%Y-%m-%d-%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: 'Export dir artifact name'
        id: dir_artifact_name
        shell: bash
        run: |
          echo "dir_artifact_name=${{ env.DIR_ARTIFACT_NAME }}" >> $GITHUB_OUTPUT

      - name: 'Export external GitHub repository details'
        id: external_github_repo_details
        shell: bash
        run: |
          echo "gh_repo_owner=${{ env.GH_REPO_OWNER }}" >> $GITHUB_OUTPUT
          echo "gh_repo_name=${{ env.GH_REPO_NAME }}" >> $GITHUB_OUTPUT

  upload_to_azure:
    needs: dynatrace_export_configuration
    uses: ./.github/workflows/azure_blob_upload.yaml
    if: ${{ github.event.inputs.storage == 'azure-blob' }}
    with:
      environment: ${{ github.event.inputs.source_environment }}
      target_folder: ${{ needs.dynatrace_export_configuration.outputs.target_folder }}
      export_file_name: monaco-${{ github.event.inputs.source_environment }}
      build_timestamp: ${{ needs.dynatrace_export_configuration.outputs.build_timestamp }}
      tf_backend_storage_account: ${{ needs.dynatrace_export_configuration.outputs.tf_backend_storage_account }}
      tf_backend_container: ${{ needs.dynatrace_export_configuration.outputs.tf_backend_container }}
      dir_artifact_name: ${{ needs.dynatrace_export_configuration.outputs.dir_artifact_name }}
    secrets:
      arm_access_key: ${{ secrets.ARM_ACCESS_KEY }}

  push_to_github:
    needs: dynatrace_export_configuration
    uses: ./.github/workflows/github_repo_upload.yaml
    if: ${{ github.event.inputs.storage == 'github-repo' }}
    with:
      environment: ${{ github.event.inputs.source_environment }}
      dir_artifact_name: ${{ needs.dynatrace_export_configuration.outputs.dir_artifact_name }}
      gh_repo_owner: ${{ needs.dynatrace_export_configuration.outputs.gh_repo_owner }}
      gh_repo_name: ${{ needs.dynatrace_export_configuration.outputs.gh_repo_name }}
      gh_branch_name: monaco-${{ github.event.inputs.source_environment }}-${{ needs.dynatrace_export_configuration.outputs.build_timestamp }}
    secrets:
      gh_repo_token: ${{ secrets.GH_TOKEN }}
name: "Dynatrace Monaco Tool Deploy"

on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: "Source Dynatrace environment"
        required: true
        type: choice
        options:
          - yhu28601
        default: yhu28601
      source_export_file:
        description: "Source Dynatrace Configuration Archive File"
        required: true
        type: string
      target_environment:
        description: "Target Dynatrace environment"
        required: true
        type: choice
        options:
          - nyw40909
        default: nyw40909
      monaco_action:
        description: "Monaco action to perform"
        required: true
        type: choice
        options:
          - dry-run
          - deploy
          - delete
        default: deploy

# Limit concurrent runs per environment to prevent state conflicts
concurrency:
  group: monaco-export-${{ github.event.inputs.target_environment }}
  cancel-in-progress: false

jobs:
  dynatrace_export_configuration:
    name: Dynatrace Monaco ${{ github.event.inputs.monaco_action }} [${{ github.event.inputs.target_environment }}]
    runs-on: ubuntu-latest

    # GitHub Repo Environments can be used to protect against accidental deployments to production and to provide environment-specific secrets and variables.
    # By setting the environment in the workflow, you can leverage these features.
    environment: ${{ github.event.inputs.target_environment }}

    env:
      # GitHub automatically provides a GITHUB_TOKEN secret to authenticate API requests made by the workflow.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Dynatrace environment URL and API token — also stored as secrets in GitHub environments.
      DYNATRACE_ENV_URL: ${{ vars.DYNATRACE_ENV_URL }}
      # Dynatrace OAuth2 Client (Source)
      DT_CLIENT_ID: ${{ secrets.DT_CLIENT_ID }}
      DT_CLIENT_SECRET: ${{ secrets.DT_CLIENT_SECRET }}
      DT_ACCOUNT_ID: ${{ vars.DT_ACCOUNT_ID }}
      # Dynatrace Monaco Tool Export Target Folder
      MONACO_TARGET_FOLDER: environments/${{ github.event.inputs.source_environment }}/monaco
      MONACO_EXPORT_ZIP_FILE_NAME_PREFIX: monaco-${{ github.event.inputs.source_environment }}
      # Azure Service Principal credentials — stored as secrets in each
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

    defaults:
      run:
        working-directory: ${{ env.MONACO_TARGET_FOLDER }}

    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Download zip to Azure Blob Storage'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob download \
              --account-name ${{ vars.TF_BACKEND_STORAGE_ACCOUNT }} \
              --container-name ${{ vars.TF_BACKEND_CONTAINER }} \
              --name $MONACO_TARGET_FOLDER/${{ github.event.inputs.source_export_file }}.tar.gz \
              --file $MONACO_TARGET_FOLDER/${{ github.event.inputs.source_export_file }}.tar.gz \
              --auth-mode key \
              --account-key $ARM_ACCESS_KEY

      - name: 'Unpack Dynatrace Configuration Archive'
        run: |
          mkdir -p ./.generated
          tar -xzvf ./${{ github.event.inputs.source_export_file }}.tar.gz -C ./.generated

      - name: 'Re-Generate Monaco Accounts Manifest'
        run: |
          cat <<EOF > ./.generated/manifest-accounts.yaml
          manifestVersion: "1.0"
          projects:
            - name: accounts
          environmentGroups: []
          accounts:
            - name: account_$DT_ACCOUNT_ID
              accountUUID:
                value: $DT_ACCOUNT_ID
              oAuth:
                clientId:
                  type: environment
                  name: DT_CLIENT_ID
                clientSecret:
                  type: environment
                  name: DT_CLIENT_SECRET
          EOF
          cat ./.generated/manifest-accounts.yaml

      - name: 'Re-Generate Monaco Projects Manifest'
        run: |
          cat <<EOF > ./.generated/manifest-projects.yaml
          manifestVersion: "1.0"
          projects:
            - name: project
          environmentGroups:
            - name: default
              environments:
                - name: project
                  url:
                    value: $DYNATRACE_ENV_URL
                  auth:
                    oAuth:
                      clientId:
                        type: environment
                        name: DT_CLIENT_ID
                      clientSecret:
                        type: environment
                        name: DT_CLIENT_SECRET
          EOF
          cat ./.generated/manifest-projects.yaml

      - name: 'Exclude Default Dynatrace Dashboards from Deployment'
        run: |
          cp ../../../scripts/monaco/update_config.sh ./.generated/
          chmod +x ./.generated/update_config.sh
          cd ./.generated 
          ./update_config.sh
          cat project/document-dashboard/config.yaml

      - name: 'Install Dynatrace Monaco Tool'
        run: |
          curl -L https://github.com/Dynatrace/dynatrace-configuration-as-code/releases/latest/download/monaco-linux-amd64 -o monaco-linux-amd64
          mv monaco-linux-amd64 monaco
          chmod +x monaco
          sudo mv monaco /usr/local/bin/
          monaco version

      - name: 'Dynatrace Monaco Projects Deploy (Dry-Run)'
        if: ${{ github.event.inputs.monaco_action == 'dry-run' }}
        run: |
          cd ./.generated
          ls -las ./project
          monaco deploy manifest-projects.yaml --dry-run --continue-on-error --project project

      - name: 'Dynatrace Monaco Projects Deploy'
        if: ${{ github.event.inputs.monaco_action == 'deploy' }}
        run: |
          cd ./.generated
          ls -las ./project
          monaco deploy manifest-projects.yaml --continue-on-error --project project

      - name: 'Dynatrace Monaco Projects Delete'
        if: ${{ github.event.inputs.monaco_action == 'delete' }}
        run: |
          cd ./.generated
          monaco generate deletefile manifest-projects.yaml --project project
          cat delete.yaml
          monaco delete --manifest manifest-projects.yaml --file delete.yaml
manifestVersion: 1.0

projects:
  - name: saas
    path: saas/${tenantId}

environmentGroups:
  - name: saas
    environments:
      - name: ${tenantId}
        url:
          value: https://${tenantId}.live.dynatrace.com
        auth:
          oAuth:
            clientId:
              name: DT_CLIENT_ID
            clientSecret:
              name: DT_CLIENT_SECRET
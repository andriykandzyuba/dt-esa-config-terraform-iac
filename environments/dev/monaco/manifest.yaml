manifestVersion: 1.0

projects:
  - name: ENV
    path: ENV/latest

environmentGroups:
  - name: ENV
    environments:
      - name: ENV
        url:
          value: DYNATRACE_ENV_URL
        auth:
          oAuth:
            clientId:
              name: DT_CLIENT_ID
            clientSecret:
              name: DT_CLIENT_SECRET
